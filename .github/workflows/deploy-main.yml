name: Deploy to cloudtype

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy
        uses: cloudtype-github-actions/deploy@v1
        with:
          token: ${{ secrets.CLOUDTYPE_TOKEN }}
          project: ssafy_slap/backend
          stage: main
          yaml: >
            name: ssafy-slap-backend

            app: java@17

            options:
              ports: 8080
              env:
                - name: DB_PASSWORD
                  value: ${{ secrets.DB_PASSWORD }}
                - name: DB_URL
                  value: ${{ secrets.DB_URL }}
                - name: DB_USERNAME
                  value: ${{ secrets.DB_USERNAME }}
                - name: JWT_SECRET
                  value: ${{ secrets.JWT_SECRET }}
                - name: KAKAO_REST_API_KEY
                  value: ${{ secrets.KAKAO_REST_API_KEY }}
                - name: KMA_SERVICE_KEY
                  value: ${{ secrets.KMA_SERVICE_KEY }}
                - name: OAUTH_GOOGLE_CLIENT_ID
                  value: ${{ secrets.OAUTH_GOOGLE_CLIENT_ID }}
                - name: OAUTH_GOOGLE_CLIENT_SECRET
                  value: ${{ secrets.OAUTH_GOOGLE_CLIENT_SECRET }}
                - name: OAUTH_KAKAO_CLIENT_ID
                  value: ${{ secrets.OAUTH_KAKAO_CLIENT_ID }}
                - name: OAUTH_KAKAO_CLIENT_SECRET
                  value: ${{ secrets.OAUTH_KAKAO_CLIENT_SECRET }}
                - name: OAUTH_NAVER_CLIENT_ID
                  value: ${{ secrets.OAUTH_NAVER_CLIENT_ID }}
                - name: OAUTH_NAVER_CLIENT_SECRET
                  value: ${{ secrets.OAUTH_NAVER_CLIENT_SECRET }}
                - name: AWS_ACCESS_KEY_ID
                  value: ${{ secrets.AWS_ACCESS_KEY_ID }}
                - name: AWS_REGION
                  value: ${{ secrets.AWS_REGION }}
                - name: AWS_SECRET_ACCESS_KEY
                  value: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
                - name: APP_FRONTEND_ORIGINS
                  value: ${{ secrets.APP_FRONTEND_ORIGINS }}
                - name: APP_DEFAULT_FRONTEND_ORIGIN
                  value: ${{ secrets.APP_DEFAULT_FRONTEND_ORIGIN }}
                - name: GMS_KEY
                  value: ${{ secrets.GMS_KEY }}
              buildenv: []
            context:
              git:
                url: git@github.com:${{ github.repository }}.git
                ref: ${{ github.ref }}
              preset: java-springboot
