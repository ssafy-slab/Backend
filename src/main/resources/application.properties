spring.application.name=ssafy_slap

spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.servlet.multipart.max-file-size=2MB
spring.servlet.multipart.max-request-size=2MB

mybatis.mapper-locations=classpath:mapper/**/*.xml
mybatis.configuration.map-underscore-to-camel-case=true

jwt.secret=${JWT_SECRET:local-development-secret-key-change-me}
jwt.access-token-validity-millis=${JWT_ACCESS_TOKEN_VALIDITY_MILLIS:3600000}

weather.kma.service-key=${KMA_SERVICE_KEY:}
weather.kma.vilage-forecast-url=http://apis.data.go.kr/1360000/VilageFcstInfoService_2.0/getVilageFcst

kakao.local.rest-api-key=${KAKAO_REST_API_KEY:}
kakao.local.category-search-url=https://dapi.kakao.com/v2/local/search/category.json
kakao.local.nearby-cache-ttl-days=7

community.s3.bucket=${COMMUNITY_S3_BUCKET:ssafyslapbucket}
community.s3.region=${AWS_REGION:ap-northeast-2}
community.s3.public-base-url=${COMMUNITY_S3_PUBLIC_BASE_URL:}

app.frontend-origins=${APP_FRONTEND_ORIGINS:http://localhost:5173,http://127.0.0.1:5173,http://*:5173,https://ssafyslap.vercel.app}
app.default-frontend-origin=${APP_DEFAULT_FRONTEND_ORIGIN:https://ssafyslap.vercel.app}

oauth.kakao.client-id=${OAUTH_KAKAO_CLIENT_ID:}
oauth.kakao.client-secret=${OAUTH_KAKAO_CLIENT_SECRET:}
oauth.kakao.redirect-uri=${OAUTH_KAKAO_REDIRECT_URI:https://port-0-ssafy-slap-backend-mqovfys419716b6c.sel3.cloudtype.app/api/oauth/kakao/callback}
oauth.google.client-id=${OAUTH_GOOGLE_CLIENT_ID:}
oauth.google.client-secret=${OAUTH_GOOGLE_CLIENT_SECRET:}
oauth.google.redirect-uri=${OAUTH_GOOGLE_REDIRECT_URI:https://port-0-ssafy-slap-backend-mqovfys419716b6c.sel3.cloudtype.app/api/oauth/google/callback}
oauth.naver.client-id=${OAUTH_NAVER_CLIENT_ID:}
oauth.naver.client-secret=${OAUTH_NAVER_CLIENT_SECRET:}
oauth.naver.redirect-uri=${OAUTH_NAVER_REDIRECT_URI:https://port-0-ssafy-slap-backend-mqovfys419716b6c.sel3.cloudtype.app/api/oauth/naver/callback}
